        }

        textarea {

        .radio-group,

            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .radio-option,
        .checkbox-option {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;

        .radio-option:hover,
        .checkbox-option:hover {
            border-color: #1e3a5f;
            background: #f9fafb;

            cursor: pointer;
            width: 20px;

            font-weight: 600;

        .submit-button:disabled {

    <script>
        // Form data
        const TEMPLATE_ID = "70d107d9-c9d6-401f-9a20-6a266dabeadd";
        const OPPORTUNITY_TYPE = "Contact Center";
        const OPPORTUNITY_SUBTYPE = "SDSDSD";
        const WEBHOOK_URL = "https://opex-form-webhook-4jypryamoq-uc.a.run.app";

        // Progress tracking
        const form = document.getElementById('surveyForm');
        const progressFill = document.getElementById('progressFill');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');

        // Update progress bar
        function updateProgress() {
            const inputs = form.querySelectorAll('input[required], textarea[required], select[required]');
            let answered = 0;

            inputs.forEach(input => {
                if (input.type === 'radio') {
                    const name = input.name;
                    const checked = form.querySelector(`input[name="${name}"]:checked`);
                    if (checked && !input.dataset.counted) {
                        answered++;
                        // Mark all radios in group as counted
                        form.querySelectorAll(`input[name="${name}"]`).forEach(r => r.dataset.counted = 'true');
                    }
                } else if (input.value.trim() !== '') {
                    answered++;
                }
            });

            // Reset counted flags for next calculation
            inputs.forEach(input => delete input.dataset.counted);

            const radioGroups = new Set();
            inputs.forEach(input => {
                if (input.type === 'radio') radioGroups.add(input.name);
            });

            const totalRequired = inputs.length - radioGroups.size + radioGroups.size;
            const progress = (answered / totalRequired) * 100;
            progressFill.style.width = progress + '%';
        }

        // Add event listeners for progress tracking
        form.addEventListener('input', updateProgress);
        form.addEventListener('change', updateProgress);

        // Form validation
        function validateForm() {
            let isValid = true;
            const requiredInputs = form.querySelectorAll('[required]');

            requiredInputs.forEach(input => {
                const errorMsg = document.getElementById('error_' + input.dataset.questionId);

                if (input.type === 'radio') {
                    const name = input.name;
                    const checked = form.querySelector(`input[name="${name}"]:checked`);
                    if (!checked) {
                        isValid = false;
                        if (errorMsg) errorMsg.classList.add('show');
                    } else {
                        if (errorMsg) errorMsg.classList.remove('show');
                    }
                } else {
                    if (input.value.trim() === '') {
                        isValid = false;
                        input.classList.add('input-error');
                        if (errorMsg) errorMsg.classList.add('show');
                    } else {
                        input.classList.remove('input-error');
                        if (errorMsg) errorMsg.classList.remove('show');
                    }
                }
            });

            return isValid;
        }

        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!validateForm()) {
                alert('Please fill in all required fields');
                return;
            }

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            // Collect form data
            const formData = new FormData(form);
            const formFields = {
                template_id: TEMPLATE_ID,
                opportunity_type: OPPORTUNITY_TYPE,
                opportunity_subtype: OPPORTUNITY_SUBTYPE,
                submitted_at: new Date().toISOString()
            };

            formData.forEach((value, key) => {
                formFields[key] = value;
            });

            // Format payload for webhook (expects formName and formData)
            const payload = {
                formName: `form_responses_${OPPORTUNITY_TYPE}_${OPPORTUNITY_SUBTYPE}`.toLowerCase().replace(/[^a-z0-9]/g, '_'),
                formData: formFields
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    form.style.display = 'none';
                    successMessage.classList.add('show');
                } else {
                    throw new Error('Submission failed');
                }
            } catch (error) {
                console.error('Error submitting form:', error);
                alert('There was an error submitting the form. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Survey';
            }
        });

        // Initialize progress
        updateProgress();
    </script>
